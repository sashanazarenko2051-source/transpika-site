<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontakty — Transpika</title>
  <meta name="description" content="Kontaktujte Transpiku. Kanceláře v Praze a Kyjevě. Telefon, WhatsApp, Telegram, Email. Online objednávkový formulář.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body><script>var t=localStorage.getItem("et_theme")||"light";document.documentElement.setAttribute("data-theme",t);</script>

  <nav id="navbar"></nav>

  <!-- PAGE HERO -->
  <div class="page-hero" style="background-image:url('https://images.unsplash.com/photo-1652093932112-3fbc369da1f3?fm=jpg&q=85&w=1600&fit=crop');">
    <h1 class="page-hero-title">Kontakty</h1>
    <div class="breadcrumb">
      <a href="index.html">Domů</a> / Kontakty
    </div>
  </div>

  <!-- CONTACT SECTION -->
  <section class="section">
    <div class="container">
      <div class="contact-grid">

        <!-- CONTACT FORM -->
        <div class="reveal">
          <div style="background:var(--white); border:1px solid #e5e7eb; border-radius:var(--radius); padding:36px;">
            <h3 style="font-size:1.2rem; font-weight:700; margin-bottom:8px;">Objednat přepravu</h3>
            <p style="font-size:0.875rem; color:var(--gray); margin-bottom:28px;">Vyplňte formulář — manažer vás kontaktuje do 15 minut</p>

            <div id="formSuccess" style="display:none; background:#dcfce7; border:1px solid #86efac; color:#166534; border-radius:10px; padding:16px 20px; margin-bottom:20px; font-weight:600;">
              ✅ Vaše poptávka přijata! Čekejte na telefonát manažera do 15 minut.
            </div>

            <form id="contactForm" onsubmit="handleContactForm(event)">
              <div class="form-group">
                <label for="cName">Vaše jméno *</label>
                <input type="text" id="cName" name="name" placeholder="Jan Novák" required>
              </div>
              <div class="form-group">
                <label for="cPhone">Telefon *</label>
                <input type="tel" id="cPhone" name="phone" placeholder="+380 nebo +420..." required>
              </div>
              <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
                <div class="form-group">
                  <label for="cFrom">Odkud *</label>
                  <input type="text" id="cFrom" name="from" placeholder="Město odeslání" required>
                </div>
                <div class="form-group">
                  <label for="cTo">Kam *</label>
                  <input type="text" id="cTo" name="to" placeholder="Město určení" required>
                </div>
              </div>
              <div class="form-group">
                <label for="cService">Typ služby *</label>
                <select id="cService" name="service" required>
                  <option value="" disabled selected>Vyberte službu</option>
                  <option value="passenger">Osobní přeprava</option>
                  <option value="cargo">Nákladní přeprava / balík</option>
                  <option value="hourly">Hodinový pronájem dodávky</option>
                  <option value="moving">Stěhování</option>
                  <option value="other">Jiné</option>
                </select>
              </div>
              <div class="form-group">
                <label for="cComment">Komentář</label>
                <textarea id="cComment" name="comment" placeholder="Detaily objednávky: datum, počet cestujících, váha nákladu..."></textarea>
              </div>
              <button type="submit" class="btn-blue" style="width:100%; justify-content:center; font-size:1rem; padding:14px;">📩 Odeslat poptávku</button>
            </form>
          </div>
        </div>

      </div>
    </div>
  </section>


  <footer id="site-footer"></footer>

  <script src="auth.js"></script>
  <script>
    renderNav('contact'); initTheme();
    renderFooter();
    initReveal();
    renderFloat();

    function handleContactForm(e) {
      e.preventDefault();
      const form = document.getElementById('contactForm');
      const success = document.getElementById('formSuccess');
      form.style.display = 'none';
      success.style.display = 'block';
      showToast('Poptávka odeslána! Čekejte na telefonát.', '#2e7d32');
    }
  </script>
</body>
</html>
